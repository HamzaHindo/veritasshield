
<h2>Analyze_body</h2>
<ul class="parameter">
  <li class="param-required-true">file : byte[]
    <br/>Document file to analyze (PDF, JPG, PNG, JPEG)
  </li>
</ul>
<ul class="parameter">
  <li class="param-required-false">title : String
    <br/>Document title (defaults to filename if not provided)
  </li>
</ul>
<ul class="parameter">
  <li class="param-required-false">language : String
    <br/>Document language for OCR processing
  </li>
</ul>
