version: '3.8'

services:
  neo4j:
    image: neo4j:5.20.0
    container_name: neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"  # HTTP / Browser UI
      - "7687:7687"  # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/Ham@za515047
      - NEO4J_dbms_memory_heap_max__size=2G  # Optional: tune JVM heap
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
